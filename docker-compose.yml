services:
  netease-musician-task:
    # 使用预构建镜像（推荐）
    image: xinghehy/netease-musician-task:latest
    # 或使用本地构建：
    # build: .
    # image: netease-musician-task:latest
    container_name: netease-musician-task
    restart: always
    volumes:
      - ./log:/app/log
      - ./playwright_profiles:/app/playwright_profiles
      - ./debug:/app/debug
    environment:
      - TZ=Asia/Shanghai
      # Redis连接URL，格式：redis://[password@]host:port/db
      - REDIS_URL=redis://localhost:6379/0
      # 每日任务执行时间（格式：HH:MM）
      - SEND_TIME=09:30
      # 间隔任务的执行间隔天数
      - EXECUTION_INTERVAL_DAYS=7
      # 每月最大发送次数限制
      - MAX_MONTHLY_SENDS=4
      # 登录方式
      - LOGIN_METHOD=playwright
      # 企业微信webhook密钥
      - WECOM_WEBHOOK_KEY=your-wecom-webhook-key
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
